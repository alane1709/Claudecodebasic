<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: {
              bg: '#090A14',
              card: '#111327',
              border: '#1E2035',
              muted: '#2A2D47',
            },
            primary: '#DF6B33',
            primaryHover: '#C25A27',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { background-color: #090A14; }
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px #111327 inset !important;
      -webkit-text-fill-color: #e2e8f0 !important;
    }
    .social-btn:hover .social-icon { opacity: 1; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center font-inter text-slate-200 px-4 py-8">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 border border-primary/20 mb-4">
        <i data-lucide="lock-keyhole" class="w-8 h-8 text-primary"></i>
      </div>
      <h1 class="font-poppins text-3xl font-extrabold text-white mb-2">Welcome Back</h1>
      <p class="text-slate-400 text-sm">Sign in to your account to continue</p>
    </div>

    <!-- Card -->
    <div class="bg-dark-card border border-dark-border rounded-2xl p-6 sm:p-8 shadow-2xl shadow-black/50">

      <!-- Email -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-300 mb-2" for="email">Email Address</label>
        <div class="relative">
          <span class="email-icon absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 transition-colors">
            <i data-lucide="mail" class="w-5 h-5"></i>
          </span>
          <input
            type="email"
            id="email"
            placeholder="you@example.com"
            class="email-input w-full bg-dark-muted/50 border border-dark-border rounded-xl py-3 pl-12 pr-4 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/40 transition-all duration-200"
          >
        </div>
        <p class="email-error hidden mt-2 text-sm text-red-400 flex items-center gap-1.5">
          <i data-lucide="alert-circle" class="w-4 h-4"></i>
          <span></span>
        </p>
      </div>

      <!-- Password -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-300 mb-2" for="password">Password</label>
        <div class="relative">
          <span class="password-icon absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 transition-colors">
            <i data-lucide="key-round" class="w-5 h-5"></i>
          </span>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            class="password-input w-full bg-dark-muted/50 border border-dark-border rounded-xl py-3 pl-12 pr-12 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/40 transition-all duration-200"
          >
          <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
            <i data-lucide="eye" class="w-5 h-5" id="eyeIcon"></i>
          </button>
        </div>
        <p class="password-error hidden mt-2 text-sm text-red-400 flex items-center gap-1.5">
          <i data-lucide="alert-circle" class="w-4 h-4"></i>
          <span></span>
        </p>
      </div>

      <!-- Remember + Forgot -->
      <div class="flex items-center justify-between mb-8">
        <label class="flex items-center gap-2.5 cursor-pointer group">
          <div class="relative">
            <input type="checkbox" id="remember" class="sr-only peer">
            <div class="w-5 h-5 rounded-md border border-dark-border bg-dark-muted/50 peer-checked:bg-primary peer-checked:border-primary transition-all duration-200 flex items-center justify-center">
              <i data-lucide="check" class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100"></i>
            </div>
          </div>
          <span class="text-sm text-slate-400 group-hover:text-slate-200 transition-colors select-none">Remember me</span>
        </label>
        <a href="#" class="text-sm text-primary hover:text-primaryHover transition-colors font-medium">Forgot password?</a>
      </div>

      <!-- Login Button -->
      <button
        type="button"
        id="loginBtn"
        class="w-full bg-primary hover:bg-primaryHover text-white font-poppins font-bold text-base py-3.5 rounded-xl transition-all duration-200 hover:shadow-lg hover:shadow-primary/25 active:scale-[0.98] flex items-center justify-center gap-2 mb-6"
      >
        <i data-lucide="log-in" class="w-5 h-5"></i>
        Sign In
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-4 mb-6">
        <div class="flex-1 h-px bg-dark-border"></div>
        <span class="text-xs text-slate-500 uppercase tracking-wider">Or continue with</span>
        <div class="flex-1 h-px bg-dark-border"></div>
      </div>

      <!-- Social Buttons -->
      <div class="grid grid-cols-3 gap-3">

        <!-- Google -->
        <button type="button" class="social-btn flex items-center justify-center py-3 rounded-xl bg-dark-muted/50 border border-dark-border hover:border-slate-600 hover:bg-dark-muted transition-all duration-200 active:scale-[0.97] group">
          <svg class="w-5 h-5 social-icon opacity-70 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </button>

        <!-- GitHub -->
        <button type="button" class="social-btn flex items-center justify-center py-3 rounded-xl bg-dark-muted/50 border border-dark-border hover:border-slate-600 hover:bg-dark-muted transition-all duration-200 active:scale-[0.97]">
          <svg class="w-5 h-5 text-slate-300 social-icon opacity-70 hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
        </button>

        <!-- Facebook -->
        <button type="button" class="social-btn flex items-center justify-center py-3 rounded-xl bg-dark-muted/50 border border-dark-border hover:border-slate-600 hover:bg-dark-muted transition-all duration-200 active:scale-[0.97]">
          <svg class="w-5 h-5 text-slate-300 social-icon opacity-70 hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Sign up link -->
    <p class="text-center mt-6 text-sm text-slate-500">
      Don't have an account?
      <a href="register.html" class="text-primary hover:text-primaryHover transition-colors font-medium">Sign up</a>
    </p>
  </div>

  <script>
    // Init lucide icons
    lucide.createIcons();

    // Elements
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.querySelector('.email-error');
    const passwordError = document.querySelector('.password-error');
    const emailIcon = document.querySelector('.email-icon');
    const passwordIcon = document.querySelector('.password-icon');
    const loginBtn = document.getElementById('loginBtn');
    const toggleBtn = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function setError(el, icon, errEl, msg) {
      el.classList.add('border-red-500', 'focus:border-red-500', 'focus:ring-red-500/40');
      el.classList.remove('border-dark-border', 'focus:border-primary', 'focus:ring-primary/40');
      icon.classList.remove('text-slate-500');
      icon.classList.add('text-red-400');
      errEl.querySelector('span').textContent = msg;
      errEl.classList.remove('hidden');
      errEl.classList.add('flex');
    }

    function clearError(el, icon, errEl) {
      el.classList.remove('border-red-500', 'focus:border-red-500', 'focus:ring-red-500/40');
      el.classList.add('border-dark-border', 'focus:border-primary', 'focus:ring-primary/40');
      icon.classList.remove('text-red-400');
      icon.classList.add('text-slate-500');
      errEl.classList.add('hidden');
      errEl.classList.remove('flex');
    }

    function validateEmail() {
      const val = emailInput.value.trim();
      if (!val) {
        setError(emailInput, emailIcon, emailError, 'Email is required');
        return false;
      }
      if (!EMAIL_RE.test(val)) {
        setError(emailInput, emailIcon, emailError, 'Invalid email address');
        return false;
      }
      clearError(emailInput, emailIcon, emailError);
      return true;
    }

    function validatePassword() {
      const val = passwordInput.value;
      if (!val) {
        setError(passwordInput, passwordIcon, passwordError, 'Password is required');
        return false;
      }
      clearError(passwordInput, passwordIcon, passwordError);
      return true;
    }

    emailInput.addEventListener('input', validateEmail);
    passwordInput.addEventListener('input', validatePassword);
    emailInput.addEventListener('blur', validateEmail);
    passwordInput.addEventListener('blur', validatePassword);

    loginBtn.addEventListener('click', () => {
      const emailOk = validateEmail();
      const passwordOk = validatePassword();
      if (!emailOk) {
        emailInput.focus();
      } else if (!passwordOk) {
        passwordInput.focus();
      }
      if (emailOk && passwordOk) {
        // form is valid — submit here
      }
    });

    // Toggle password visibility
    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
      lucide.createIcons();
    });
  </script>
</body>
</html>
